<script>
// Storage polyfill — if window.storage unavailable, use sessionStorage
if(typeof window.storage === 'undefined'){
  window.storage = {
    _data:{},
    get: function(k){ return Promise.resolve(this._data[k]?{value:this._data[k]}:null); },
    set: function(k,v){ this._data[k]=v; return Promise.resolve({key:k,value:v}); },
    delete: function(k){ delete this._data[k]; return Promise.resolve({key:k,deleted:true}); }
  };
}
</script>
